# Baseline scoring configuration.
# Purpose: high recall candidate ranking, not final TLM relevance classification.
# Frozen after evaluation against reviewed annotation dataset.
# Baseline threshold: 0.10.
# Result without review cases: precision 0.818, recall 0.973, FP 16, FN 2.
# Further optimization should only address generic blind spots, not dataset specific cases.


